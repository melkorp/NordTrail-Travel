backend:
  name: github
  repo: melkorp/NordTrail-Travel
  branch: main

  # OAuth provider
  base_url: https://sveltia-cms-auth.pages.dev
  auth_endpoint: /auth
  app_id: Ov23lixSv3yAtETkee9s

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: "ru"

collections:
  # ───────────────── BLOG ─────────────────
  - name: "blog"
    label: "Статьи блога"

    folder: "content/blog"

    create: true
    slug: "{{slug}}"

    extension: "mdx"
    format: "frontmatter"

    fields:
      - label: "Slug"
        name: "slug"
        widget: "string"

      - label: "Заголовок"
        name: "title"
        widget: "string"

      - label: "Категория"
        name: "category"
        widget: "select"
        options:
          - { label: "Бюджет", value: "Budget" }
          - { label: "Хайкинг", value: "Hiking" }
          - { label: "Люкс", value: "Luxury" }
          - { label: "Зима", value: "Winter" }
          - { label: "Соло-путешествия", value: "Solo Travel" }
          - { label: "Семья", value: "Family" }

      - label: "Время чтения"
        name: "readTime"
        widget: "string"
        default: "8 min read"

      - label: "Дата (ISO)"
        name: "dateIso"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: "Дата (отображение)"
        name: "dateDisplay"
        widget: "string"
        hint: "Например: 15 мая 2026"

      - label: "Автор"
        name: "author"
        widget: "string"
        default: "NordTrail Research Team"

      - label: "Обложка статьи"
        name: "image"
        widget: "image"
        required: false

      - label: "Краткий ответ (Quick Answer)"
        name: "quickAnswer"
        widget: "text"

      - label: "Секции статьи"
        name: "sections"
        widget: "list"
        fields:
          - label: "Заголовок секции"
            name: "heading"
            widget: "string"

          - label: "Текст секции"
            name: "content"
            widget: "text"

      - label: "Таблица бюджета"
        name: "budgetTable"
        widget: "list"
        fields:
          - label: "Пункт"
            name: "item"
            widget: "string"

          - label: "Бюджетно"
            name: "low"
            widget: "string"

          - label: "Премиум"
            name: "premium"
            widget: "string"

      - label: "FAQ"
        name: "faq"
        widget: "list"
        fields:
          - label: "Вопрос"
            name: "q"
            widget: "string"

          - label: "Ответ"
            name: "a"
            widget: "text"

      - label: "Заключение"
        name: "conclusion"
        widget: "text"

  # ───────────────── DESTINATIONS ─────────────────
  - name: "destinations"
    label: "Направления"

    folder: "content/destinations"

    create: true
    slug: "{{slug}}"

    extension: "mdx"
    format: "frontmatter"

    fields:
      - label: "Slug"
        name: "slug"
        widget: "string"

      - label: "Название"
        name: "name"
        widget: "string"

      - label: "H1 заголовок"
        name: "h1"
        widget: "string"

      - label: "Краткий ответ"
        name: "quickAnswer"
        widget: "text"

      - label: "Лучший сезон"
        name: "bestSeason"
        widget: "string"

      - label: "Бюджет"
        name: "budget"
        widget: "select"
        options:
          - { label: "Низкий", value: "низкий" }
          - { label: "Средний", value: "средний" }
          - { label: "Высокий", value: "высокий" }

      - label: "Сложность"
        name: "difficulty"
        widget: "select"
        options:
          - { label: "Лёгкое", value: "лёгкое" }
          - { label: "Среднее", value: "среднее" }
          - { label: "Сложное", value: "сложное" }

      - label: "Подходит для детей"
        name: "forKids"
        widget: "boolean"
        default: true

      - label: "Безопасность (1–5)"
        name: "safety"
        widget: "number"
        min: 1
        max: 5
        value_type: "int"

      - label: "Секции"
        name: "sections"
        widget: "list"
        fields:
          - label: "Заголовок"
            name: "title"
            widget: "string"

          - label: "Текст"
            name: "content"
            widget: "text"

      - label: "FAQ"
        name: "faq"
        widget: "list"
        fields:
          - label: "Вопрос"
            name: "question"
            widget: "string"

          - label: "Ответ"
            name: "answer"
            widget: "text"
